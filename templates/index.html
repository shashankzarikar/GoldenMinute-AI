<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoldenMinute AI</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>GoldenMinute AI</h1>
        <p>Emergency Response System for Rural India</p>
    </header>
    <main class="chat-container">
        <div id="chat-box" class="chat-box">
            <div class="message system-msg">
                <p>Welcome to the GoldenMinute AI portal. Describe your emergency below.</p>
            </div>
        </div>
        <div class="input-area">
            <div class="victim-details">
                <input type="text" id="victim-phone" placeholder="Victim phone (optional)">
                <input type="text" id="victim-address" placeholder="Victim address (optional)">
            </div>
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Type your emergency here..." required autocomplete="off">
                <button type="submit">Send</button>
            </form>
        </div>
    </main>
    <div id="map-container">
        <div id="map"></div>
    </div>
    <section class="volunteer-registration">
        <h2>Volunteer Registration</h2>
        <form id="volunteer-form">
            <input type="text" id="vol-name" placeholder="Full name" required>
            <input type="text" id="vol-phone" placeholder="Phone number" required>
            <input type="email" id="vol-email" placeholder="Email" required>
            <input type="text" id="vol-skill" placeholder="Skill (e.g., CPR)" required>
            <input type="text" id="vol-lat" placeholder="Latitude" required>
            <input type="text" id="vol-lng" placeholder="Longitude" required>
            <button type="submit">Register</button>
        </form>
        <div id="volunteer-message" class="system-msg"></div>
    </section>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
